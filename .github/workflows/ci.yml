name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # EAS Build runs npm 10; lockfiles generated with npm 11 alone can omit optional
  # @emnapi/* entries and fail `npm ci` on the build worker.
  lockfile-eas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Verify lockfile (npm 10 — matches EAS Build)
        run: npm run lockfile:verify-eas

  verify:
    runs-on: ubuntu-latest
    needs: lockfile-eas
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Migration tests
        run: npm run test:migration

      - name: Lint
        run: npm run lint
